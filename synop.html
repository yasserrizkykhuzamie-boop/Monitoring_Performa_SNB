<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard SYNOP - Bulanan & Triwulanan</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        /* ----- RESET & VARIABLES ----- */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #0b1d3a; --primary-light: #1a3a6b; --primary-lighter: #2d5aa0;
            --bg: #f0f5fc; --card-bg: #ffffff; --border: rgba(60, 100, 180, 0.08);
            --shadow: 0 4px 20px rgba(0, 20, 50, 0.06); --radius: 20px; --radius-sm: 12px;
            --font: 'Inter', 'Segoe UI', system-ui, sans-serif; --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }
        body { font-family: var(--font); background: var(--bg); color: var(--primary); padding: 20px; min-height: 100vh; }
        .dashboard { max-width: 1600px; margin: 0 auto; }

        /* ----- HEADER ----- */
        .header { display: flex; flex-wrap: wrap; align-items: center; justify-content: space-between; background: var(--card-bg); padding: 18px 28px; border-radius: var(--radius); box-shadow: var(--shadow); border: 1px solid var(--border); margin-bottom: 24px; gap: 16px; border-top: 4px solid var(--primary-light); }
        .header-left { display: flex; align-items: center; gap: 16px; }
        .header-icon { width: 48px; height: 48px; background: linear-gradient(135deg, var(--primary-light), var(--primary-lighter)); border-radius: 14px; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 24px; font-weight: 700; flex-shrink: 0; }
        .header-title h1 { font-size: 24px; font-weight: 700; letter-spacing: -0.4px; color: var(--primary); }
        .header-title span { font-size: 14px; font-weight: 500; color: #5679a9; display: block; margin-top: 2px; }
        .header-right { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
        .header-badge { background: #eef4fc; padding: 6px 18px; border-radius: 40px; font-size: 13px; font-weight: 600; color: var(--primary-light); display: flex; align-items: center; gap: 8px; }
        .header-badge .dot { width: 8px; height: 8px; background: #2ecc71; border-radius: 50%; display: inline-block; }
        .header-badge.loading .dot { background: #f39c12; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0.3; } }
        .header-date { font-size: 14px; color: #4a6a8a; background: #f5f8fc; padding: 6px 16px; border-radius: 40px; font-weight: 500; }

        /* ----- FILTER BAR ----- */
        .filter-bar { display: flex; flex-wrap: wrap; align-items: center; gap: 14px; background: var(--card-bg); padding: 12px 24px; border-radius: var(--radius-sm); box-shadow: var(--shadow); border: 1px solid var(--border); margin-bottom: 24px; }
        .filter-group { display: flex; align-items: center; gap: 8px; }
        .filter-group label { font-weight: 600; font-size: 14px; color: var(--primary); }
        .filter-group select { padding: 8px 16px; border: 1px solid #dce6f2; border-radius: 10px; background: #f9fcff; font-weight: 500; font-size: 14px; color: var(--primary); cursor: pointer; transition: var(--transition); outline: none; }
        .month-tabs { display: flex; gap: 4px; flex-wrap: wrap; margin-left: auto; }
        .month-tab { padding: 6px 14px; border: none; background: transparent; border-radius: 8px; font-weight: 500; font-size: 12px; color: #4a6a8a; cursor: pointer; transition: var(--transition); }
        .month-tab.active { background: var(--primary-light); color: #fff; box-shadow: 0 4px 12px rgba(26, 58, 107, 0.25); }

        /* ----- SUMMARY CARDS ----- */
        .summary-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(170px, 1fr)); gap: 16px; margin-bottom: 24px; }
        .summary-card { background: var(--card-bg); padding: 18px 20px; border-radius: var(--radius-sm); box-shadow: var(--shadow); border: 1px solid var(--border); transition: var(--transition); }
        .summary-card .label { font-size: 12px; font-weight: 500; color: #6a8aaa; text-transform: uppercase; letter-spacing: 0.4px; }
        .summary-card .value { font-size: 30px; font-weight: 700; color: var(--primary); margin-top: 2px; letter-spacing: -0.5px; }
        .summary-card .sub { font-size: 13px; color: #5679a9; margin-top: 2px; }
        .summary-card.accent-blue .value { color: var(--primary-light); }
        .summary-card.accent-green .value { color: #1a8a4a; }
        .summary-card.accent-purple .value { color: #6b3fa0; }
        .summary-card.accent-orange .value { color: #c07a1a; }
        .summary-card.accent-red .value { color: #b02a3a; }

        /* ----- CARDS & GRID ----- */
        .card { background: var(--card-bg); border-radius: var(--radius); padding: 20px 24px 24px; box-shadow: var(--shadow); border: 1px solid var(--border); margin-bottom: 24px; overflow: hidden; transition: var(--transition); }
        .card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; flex-wrap: wrap; gap: 8px; }
        .card-header h2 { font-size: 16px; font-weight: 600; color: var(--primary); display: flex; align-items: center; gap: 10px; }
        .card-header .chip { font-size: 12px; font-weight: 500; color: #5679a9; background: #f0f6fe; padding: 4px 14px; border-radius: 40px; }
        
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
        .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 24px; }
        .grid-2-1 { display: grid; grid-template-columns: 2fr 1fr; gap: 24px; }
        
        @media (max-width: 1200px) { .grid-3 { grid-template-columns: 1fr 1fr; } .grid-2-1 { grid-template-columns: 1fr; } }
        @media (max-width: 992px) { .grid-2 { grid-template-columns: 1fr; } }
        @media (max-width: 768px) {
            .grid-3 { grid-template-columns: 1fr; } .header { flex-direction: column; align-items: flex-start; gap: 12px; }
            .header-right { width: 100%; justify-content: flex-start; } .summary-grid { grid-template-columns: repeat(2, 1fr); }
            .filter-bar { flex-direction: column; align-items: stretch; } .month-tabs { margin-left: 0; justify-content: center; }
        }

        .chart-container { position: relative; height: 220px; margin-top: 4px; }
        .chart-container.tall { height: 260px; }

        /* ----- RANKING TABLE ----- */
        .rank-table { width: 100%; border-collapse: collapse; font-size: 13px; }
        .rank-table thead th { background: #f5f9ff; color: var(--primary-light); font-weight: 600; font-size: 11px; text-transform: uppercase; padding: 10px 8px; text-align: center; border-bottom: 2px solid #dce6f2; }
        .rank-table thead th:first-child { text-align: left; padding-left: 6px; }
        .rank-table tbody td { padding: 9px 8px; text-align: center; border-bottom: 1px solid #eef2f7; color: #1f2e44; font-weight: 500; }
        .rank-table tbody td:first-child { text-align: left; font-weight: 600; color: var(--primary); padding-left: 6px; }
        .rank-badge { display: inline-flex; align-items: center; justify-content: center; width: 28px; height: 28px; border-radius: 40px; font-weight: 700; font-size: 13px; background: #eef4fc; color: var(--primary-light); }
        .rank-1 { background: #ffd700; color: #7a5a00; } .rank-2 { background: #d0d8e8; color: #3a4a6a; } .rank-3 { background: #e8c8a8; color: #6a4a2a; }
        .pct-good { color: #1a8a4a; font-weight: 700; } .pct-warn { color: #c07a1a; font-weight: 600; } .pct-bad { color: #b02a3a; font-weight: 600; }

        /* ----- FOOTER ----- */
        .footer { text-align: center; font-size: 12px; color: #7a9abb; padding: 16px 0 4px; border-top: 1px solid #e9edf2; margin-top: 8px; }
        
        #loadingOverlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(255,255,255,0.8); z-index: 999; justify-content: center; align-items: center;
            flex-direction: column; font-weight: 600; color: var(--primary);
        }
        .spinner { width: 40px; height: 40px; border: 4px solid var(--border); border-top: 4px solid var(--primary-light); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 16px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* UI MESSAGE BOX */
        .msg-box { padding: 24px; border-radius: 12px; margin-bottom: 24px; background: #fff; box-shadow: var(--shadow); }
        .msg-error { border-left: 4px solid #b02a3a; }
    </style>
</head>
<body>

    <div id="loadingOverlay">
        <div class="spinner"></div>
        <div id="loadingText">Menarik data SYNOP dari Spreadsheet...</div>
    </div>

    <div class="dashboard">
        <header class="header">
            <div class="header-left">
                <div class="header-icon">📡</div>
                <div class="header-title">
                    <h1>Dashboard Pengamatan SYNOP</h1>
                    <span>Monitoring Layanan Sandi SYNOP · Live Sheet Data</span>
                </div>
            </div>
            <div class="header-right">
                <div class="header-badge loading" id="statusBadge">
                    <span class="dot"></span>
                    <span id="statusText">Sinkronisasi...</span>
                </div>
                <div class="header-date">
                    📅 <span id="currentDate"></span>
                </div>
            </div>
        </header>

        <div class="filter-bar">
            <div class="filter-group">
                <label for="yearSelect">📆 Tahun</label>
                <select id="yearSelect"></select>
            </div>
            <div class="filter-group">
                <label for="modeSelect">⚡ Mode</label>
                <select id="modeSelect">
                    <option value="month">Bulanan</option>
                    <option value="quarter">Triwulanan</option>
                </select>
            </div>
            <div class="filter-group">
                <label for="periodSelect" id="periodLabel">📅 Bulan</label>
                <select id="periodSelect"></select>
            </div>
            <div class="month-tabs" id="periodTabs"></div>
        </div>

        <div id="uiMessageArea"></div>
        <div id="dashboardContent"></div>

        <div class="footer">
            <strong>Dashboard SYNOP AMP</strong> &middot; Data Live Google Sheets &middot; Diperbarui <span id="updateTime"></span>
        </div>
    </div>

    <script>
        // ============================================================
        // KONFIGURASI GOOGLE SPREADSHEET
        // ============================================================
        const PUBLISHED_ID = '2PACX-1vT4LcIB_-j2pfvt4BUNx4W6GKZiglF1UNo0-oR2yeKqjp7RY_004DF1GVmTxsuUiTx7oyBbrOsbx4Hp'; 
        const GID = '0'; 
        const SHEET_NAME = 'db_sinoptik';

        let personnel = [];
        let availableYears = [];
        let utcData = [];    
        let statsData = [];  
        let dailyStats = []; 
        let currentYear = new Date().getFullYear().toString();
        let currentMode = 'month'; 
        let currentPeriodIdx = new Date().getMonth();

        const monthNames = ['Januari', 'Februari', 'Maret', 'April', 'Mei', 'Juni', 'Juli', 'Agustus', 'September', 'Oktober', 'November', 'Desember'];
        const quarterNames = ['Triwulan I (Q1)', 'Triwulan II (Q2)', 'Triwulan III (Q3)', 'Triwulan IV (Q4)'];
        const quarterShortNames = ['TW I', 'TW II', 'TW III', 'TW IV'];
        const utcLabels = ['00:00', '03:00', '06:00', '09:00', '12:00', '15:00', '18:00', '21:00'];

        function csvToArray(strData) {
            const objPattern = new RegExp(("(\\,|\\r?\\n|\\r|^)(?:\"([^\"]*(?:\"\"[^\"]*)*)\"|([^\\,\\r\\n]*))"), "gi");
            let arrData = [[]];
            let arrMatches = null;
            while (arrMatches = objPattern.exec(strData)) {
                let strMatchedDelimiter = arrMatches[1];
                if (strMatchedDelimiter.length && strMatchedDelimiter !== ",") arrData.push([]);
                let strMatchedValue;
                if (arrMatches[2]) strMatchedValue = arrMatches[2].replace(new RegExp("\"\"", "g"), "\"");
                else strMatchedValue = arrMatches[3];
                arrData[arrData.length - 1].push(strMatchedValue);
            }
            return arrData;
        }

        async function fetchSheetData() {
            document.getElementById('loadingOverlay').style.display = 'flex';
            document.getElementById('uiMessageArea').innerHTML = ''; 
            document.getElementById('dashboardContent').innerHTML = ''; 
            
            const targetUrl = `https://docs.google.com/spreadsheets/d/e/${PUBLISHED_ID}/pub?gid=${GID}&single=true&output=csv`;
            let csvText = null;
            
            try {
                try {
                    const directResponse = await fetch(targetUrl);
                    if (directResponse.ok) {
                        const text = await directResponse.text();
                        if (!text.trim().startsWith('<html') && !text.trim().startsWith('<!DOCTYPE') && text.trim().length > 10) {
                            csvText = text;
                        }
                    }
                } catch (err) {
                    console.warn("Direct fetch diblokir. Menggunakan Proxy...");
                }

                if (!csvText) {
                    const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(targetUrl)}`;
                    const proxyResponse = await fetch(proxyUrl);
                    if (proxyResponse.ok) {
                        const data = await proxyResponse.json();
                        if (data && data.contents) {
                            const text = data.contents;
                            if (!text.trim().startsWith('<html') && !text.trim().startsWith('<!DOCTYPE') && text.trim().length > 10) {
                                csvText = text;
                            }
                        }
                    }
                }

                if (!csvText) throw new Error('Gagal menarik data dari file lokal. Pastikan terhubung internet.');

                processCSVData(csvText);
                
                document.getElementById('statusBadge').classList.remove('loading');
                document.getElementById('statusBadge').style.background = '#eef4fc';
                document.getElementById('statusBadge').style.color = '#1a3a6b';
                document.getElementById('statusBadge').querySelector('.dot').style.background = '#2ecc71';
                document.getElementById('statusText').textContent = 'Live Connected';
            } catch (error) {
                console.error("Error:", error);
                document.getElementById('statusBadge').classList.remove('loading');
                document.getElementById('statusBadge').style.background = '#fdeaea';
                document.getElementById('statusBadge').style.color = '#b02a3a';
                document.getElementById('statusBadge').querySelector('.dot').style.background = '#b02a3a';
                document.getElementById('statusText').textContent = 'Koneksi Gagal';

                document.getElementById('uiMessageArea').innerHTML = `
                    <div class="msg-box msg-error">
                        <h3 style="color:#b02a3a; margin-bottom:10px;">❌ Gagal Mengambil Data</h3>
                        <p><strong>Pesan:</strong> ${error.message}</p>
                    </div>
                `;
            } finally {
                document.getElementById('loadingOverlay').style.display = 'none';
            }
        }

        // ============================================================
        // FUNGSI KONVERSI ANGKA PERSENTASE ANTI-ERROR
        // ============================================================
        function parsePercentOrDecimal(rawStr) {
            if (!rawStr) return 0;
            // Ubah tanda koma menjadi titik desimal (misal "98,5%" menjadi "98.5%")
            let cleanStr = rawStr.toString().replace(/%/g, '').replace(/,/g, '.').trim();
            let val = parseFloat(cleanStr);
            if (isNaN(val)) return 0;
            // Jika angka > 1 (contoh: 98.5 atau 100), bagi 100 agar bernilai proporsi desimal 0.0 - 1.0
            if (val > 1) {
                return val / 100;
            }
            return val; // Jika sudah dalam format desimal (contoh: 0.98 atau 1), biarkan
        }

        // ============================================================
        // PEMBACAAN DATA: KETEPATAN MURNI DARI KOLOM D (INDEKS 3)
        // ============================================================
        function processCSVData(csvText) {
            const rawData = [];
            const observersSet = new Set();
            const yearsSet = new Set();

            const rows = csvToArray(csvText.trim());
            if (rows.length < 2) throw new Error('Data sheet kosong.');

            for (let i = 1; i < rows.length; i++) {
                const cells = rows[i];
                // Pastikan baris memiliki minimal kolom A sampai G (indeks 0 sampai 6)
                if (cells.length < 7 || !cells[0] || !cells[6]) continue; 

                try {
                    // 1. TANGGAL (Kolom A / Indeks 0)
                    let dateStr = cells[0].replace(/["']/g, '').trim().split(' ')[0]; 
                    let dateObj = new Date(dateStr);
                    
                    if (dateStr.includes('/')) {
                        let parts = dateStr.split('/');
                        if (parts.length === 3) {
                            let p0 = parseInt(parts[0]);
                            let p1 = parseInt(parts[1]);
                            let p2 = parseInt(parts[2]);
                            let y = p2 > 1000 ? p2 : (p0 > 1000 ? p0 : new Date().getFullYear());
                            let m = p1;
                            let d = p0;
                            if (p0 > 1000) { d = p2; } 
                            if (p1 > 12) { m = p0; d = p1; } 
                            dateObj = new Date(y, m - 1, d);
                        }
                    } else if (dateStr.includes('-')) {
                        let parts = dateStr.split('-');
                        if (parts.length === 3 && parts[2].length === 4) {
                            dateObj = new Date(parseInt(parts[2]), parseInt(parts[1]) - 1, parseInt(parts[0]));
                        }
                    }

                    if (isNaN(dateObj.getTime())) continue; 

                    const year = dateObj.getFullYear().toString();
                    const month = dateObj.getMonth();
                    const day = dateObj.getDate();
                    yearsSet.add(year);

                    // 2. JAM UTC (Kolom B / Indeks 1)
                    let utcStr = (cells[1] || '').replace(/["']/g, '').trim(); 
                    let jamAngka = 0;
                    if (utcStr.includes(':')) jamAngka = parseInt(utcStr.split(':')[0]);
                    else if (!isNaN(parseInt(utcStr))) jamAngka = parseInt(utcStr); 
                    
                    let utcSlot = 0; 
                    if (jamAngka === 0) utcSlot = 0;
                    else if (jamAngka === 3) utcSlot = 1;
                    else if (jamAngka === 6) utcSlot = 2;
                    else if (jamAngka === 9) utcSlot = 3;
                    else if (jamAngka === 12) utcSlot = 4;
                    else if (jamAngka === 15) utcSlot = 5;
                    else if (jamAngka === 18) utcSlot = 6;
                    else if (jamAngka === 21) utcSlot = 7;

                    // 3. OBSERVER (Kolom G / Indeks 6)
                    let observer = (cells[6] || '').replace(/["']/g, '').trim().toUpperCase();
                    if (!observer) continue;
                    observersSet.add(observer);

                    // 4. NILAI KETEPATAN WAKTU -> MUTLAK DARI KOLOM D (Indeks 3)
                    // Kolom E (Indeks 4) sengaja TIDAK DIGUNAKAN
                    let ketepatan = parsePercentOrDecimal(cells[3]);

                    // 5. AKURASI PENYANDIAN -> DARI KOLOM F (Indeks 5)
                    let akurasiSandi = parsePercentOrDecimal(cells[5]);

                    rawData.push({ year, month, day, utcSlot, akurasiSandi, ketepatan, observer });

                } catch (e) {
                    console.warn("Parse error at row " + i, cells);
                }
            }

            personnel = Array.from(observersSet).sort();
            availableYears = Array.from(yearsSet).sort().reverse();
            
            if(availableYears.length === 0) availableYears = [new Date().getFullYear().toString()];
            if(!availableYears.includes(currentYear)) currentYear = availableYears[0];

            const yearSelect = document.getElementById('yearSelect');
            yearSelect.innerHTML = '';
            availableYears.forEach(y => {
                const opt = document.createElement('option');
                opt.value = y; opt.textContent = y;
                if(y === currentYear) opt.selected = true;
                yearSelect.appendChild(opt);
            });

            buildEmptyDataArrays();

            rawData.forEach(d => {
                if(d.year === currentYear) {
                    const pIdx = personnel.indexOf(d.observer);
                    if (pIdx !== -1) {
                        utcData[d.month][pIdx][d.utcSlot] += 1;
                        statsData[d.month][pIdx].total += 1;
                        statsData[d.month][pIdx].akurasiSandiSum += d.akurasiSandi;
                        statsData[d.month][pIdx].ketepatanSum += d.ketepatan;
                    }

                    dailyStats[d.month][d.day].total += 1;
                    dailyStats[d.month][d.day].akurasiSandiSum += d.akurasiSandi;
                    dailyStats[d.month][d.day].ketepatanSum += d.ketepatan;
                }
            });

            setupPeriodControls();
            
            let activeMonth = new Date().getMonth();
            if (statsData[activeMonth] && statsData[activeMonth].every(p => p.total === 0)) {
                for(let m = 11; m >= 0; m--) {
                    if(!statsData[m].every(p => p.total === 0)) {
                        activeMonth = m; break;
                    }
                }
            }

            currentPeriodIdx = currentMode === 'month' ? activeMonth : Math.floor(activeMonth / 3);
            document.getElementById('periodSelect').value = currentPeriodIdx;
            updateDashboard();
        }

        function buildEmptyDataArrays() {
            utcData = [];
            statsData = [];
            dailyStats = [];

            for(let m = 0; m < 12; m++) {
                let monthUtc = [];
                let monthStats = [];
                for(let p = 0; p < personnel.length; p++) {
                    monthUtc.push(new Array(8).fill(0));
                    monthStats.push({ total: 0, akurasiSandiSum: 0, ketepatanSum: 0 });
                }
                utcData.push(monthUtc);
                statsData.push(monthStats);

                let days = [];
                for(let d = 0; d <= 31; d++) {
                    days.push({ total: 0, akurasiSandiSum: 0, ketepatanSum: 0 });
                }
                dailyStats.push(days);
            }
        }

        function getMonthsInPeriod() {
            if (currentMode === 'month') {
                return [currentPeriodIdx];
            } else {
                return [currentPeriodIdx * 3, currentPeriodIdx * 3 + 1, currentPeriodIdx * 3 + 2];
            }
        }

        function getTargetDeliveries(year, monthsArray) {
            let totalDays = 0;
            monthsArray.forEach(mIdx => {
                totalDays += new Date(parseInt(year), mIdx + 1, 0).getDate();
            });
            return totalDays * 8; // Standar SYNOP: 8 jam pengamatan per hari
        }

        function getTotals(monthsArray) {
            let total = 0, akurasiSandiSum = 0, ketepatanSum = 0;
            monthsArray.forEach(mIdx => {
                const stats = statsData[mIdx] || [];
                stats.forEach(s => {
                    total += s.total;
                    akurasiSandiSum += s.akurasiSandiSum;
                    ketepatanSum += s.ketepatanSum;
                });
            });
            return { total, akurasiSandiSum, ketepatanSum };
        }

        function getRanking(monthsArray) {
            return personnel.map((name, i) => {
                let total = 0, akurasiSandiSum = 0, ketepatanSum = 0;
                monthsArray.forEach(mIdx => {
                    const s = (statsData[mIdx] && statsData[mIdx][i]) || { total: 0, akurasiSandiSum: 0, ketepatanSum: 0 };
                    total += s.total;
                    akurasiSandiSum += s.akurasiSandiSum;
                    ketepatanSum += s.ketepatanSum;
                });
                const accSandi = total > 0 ? (akurasiSandiSum / total * 100) : 0;
                const tepatWaktu = total > 0 ? (ketepatanSum / total * 100) : 0;
                return { name, total, accSandi, tepatWaktu };
            }).filter(d => d.total > 0).sort((a, b) => b.total - a.total || b.accSandi - a.accSandi);
        }

        function getMonthlyTrend() {
            const months = []; const totals = []; const accuracies = []; const ketepatans = [];
            for (let m = 0; m < 12; m++) {
                months.push(monthNames[m].substring(0, 3));
                const { total, akurasiSandiSum, ketepatanSum } = getTotals([m]);
                totals.push(total);
                accuracies.push(total > 0 ? (akurasiSandiSum / total * 100) : 0);
                ketepatans.push(total > 0 ? (ketepatanSum / total * 100) : 0);
            }
            return { months, totals, accuracies, ketepatans };
        }

        // ============================================================
        // RENDER UI DASHBOARD
        // ============================================================
        function renderDashboard() {
            if(personnel.length === 0) return ''; 

            const monthsArray = getMonthsInPeriod();
            const periodTitle = currentMode === 'month' ? monthNames[currentPeriodIdx] : quarterNames[currentPeriodIdx];
            const targetDel = getTargetDeliveries(currentYear, monthsArray); 
            const overall = getTotals(monthsArray);
            
            const ranking = getRanking(monthsArray);
            const activeCount = ranking.length;
            const avgAccSandi = overall.total > 0 ? (overall.akurasiSandiSum / overall.total * 100) : 0;
            const avgTepat = overall.total > 0 ? (overall.ketepatanSum / overall.total * 100) : 0;

            let html = '';
            
            // SUMMARY CARDS
            html += `
                <div class="summary-grid">
                    <div class="summary-card accent-blue">
                        <div class="label">📡 Berita SYNOP Terkirim</div>
                        <div class="value">${overall.total} <span style="font-size: 20px; color: #7a9abb; font-weight: 500;">/ ${targetDel}</span></div>
                        <div class="sub">Realisasi vs Target (${periodTitle})</div>
                    </div>
                    <div class="summary-card accent-green">
                        <div class="label">🎯 Akurasi Penyandian</div>
                        <div class="value">${avgAccSandi.toFixed(1)}%</div>
                        <div class="sub">Kebenaran format sandi</div>
                    </div>
                    <div class="summary-card accent-purple">
                        <div class="label">⏱️ Nilai Ketepatan Waktu</div>
                        <div class="value">${avgTepat.toFixed(1)}%</div>
                        <div class="sub">Diambil dari Kolom D</div>
                    </div>
                    <div class="summary-card accent-orange">
                        <div class="label">👥 Observer Aktif</div>
                        <div class="value">${activeCount}</div>
                        <div class="sub">Dari total ${personnel.length} terdaftar</div>
                    </div>
                    <div class="summary-card accent-red">
                        <div class="label">🏆 Pengamat Teraktif</div>
                        <div class="value" style="font-size:22px; line-height:1.2; margin-top:6px;">${ranking.length > 0 ? ranking[0].name : '-'}</div>
                    </div>
                </div>
            `;

            // CHART: TREN HARIAN
            html += `
                <div class="card" style="margin-bottom: 24px;">
                    <div class="card-header">
                        <h2>📆 Tren Pengiriman SYNOP Harian</h2>
                        <span class="chip">${periodTitle} ${currentYear}</span>
                    </div>
                    <div class="chart-container tall">
                        <canvas id="dailyTrendChart"></canvas>
                    </div>
                </div>
            `;

            // BARIS 1: TREND + RADAR
            html += `<div class="grid-2">
                <div class="card">
                    <div class="card-header">
                        <h2>📈 Tren Capaian (12 Bulan)</h2><span class="chip">Akurasi vs Ketepatan</span>
                    </div>
                    <div class="chart-container tall"><canvas id="trendChart"></canvas></div>
                </div>
                <div class="card">
                    <div class="card-header"><h2>🕸️ Beban & Performa (Top 5)</h2><span class="chip">${periodTitle}</span></div>
                    <div class="chart-container tall"><canvas id="radarChart"></canvas></div>
                </div>
            </div>`;

            // BARIS 2: POLAR + STACKED
            html += `<div class="grid-2">
                <div class="card">
                    <div class="card-header"><h2>🍩 Proporsi Laporan Observer</h2><span class="chip">${periodTitle}</span></div>
                    <div class="chart-container"><canvas id="polarChart"></canvas></div>
                </div>
                <div class="card">
                    <div class="card-header"><h2>📊 Jam UTC Pengamatan (Top 5)</h2><span class="chip">${periodTitle}</span></div>
                    <div class="chart-container"><canvas id="stackedChart"></canvas></div>
                </div>
            </div>`;

            // BARIS 3: HEATMAP + RANKING
            const top8 = ranking.slice(0, 8);
            html += `<div class="grid-2-1">
                <div class="card">
                    <div class="card-header"><h2>🔥 Heatmap Akurasi Penyandian (Top 8)</h2><span class="chip">${periodTitle}</span></div>
                    <div style="display:grid; grid-template-columns: repeat(4, 1fr); gap:12px;">`;
            
            if(top8.length === 0) html += `<p style="grid-column: span 4; text-align:center; color:#999;">Belum ada data di periode ini.</p>`;
            
            top8.forEach((d) => {
                const pct = Math.round(d.accSandi);
                const color = pct >= 100 ? '#1a8a4a' : (pct >= 90 ? '#c07a1a' : '#b02a3a');
                const barWidth = Math.min(pct, 100);
                html += `
                    <div style="background:#f5f9ff; padding:12px; border-radius:12px; text-align:center;">
                        <div style="font-weight:600; font-size:11px; color:var(--primary); overflow:hidden; text-overflow:ellipsis; white-space:nowrap;" title="${d.name}">${d.name}</div>
                        <div style="margin:8px 0; background:#e9edf2; border-radius:20px; height:12px; overflow:hidden;">
                            <div style="width:${barWidth}%; height:100%; background:${color}; border-radius:20px; transition: width 0.6s ease;"></div>
                        </div>
                        <div style="font-size:18px; font-weight:700; color:${color};">${pct}%</div>
                        <div style="font-size:11px; color:#7a9abb;">${d.total} berita</div>
                    </div>`;
            });
            html += `</div></div>
                <div class="card">
                    <div class="card-header"><h2>🏆 Peringkat Kinerja Observer</h2><span class="chip">${periodTitle}</span></div>
                    <div style="max-height:280px; overflow-y:auto;">
                        <table class="rank-table">
                            <thead><tr><th>Rank</th><th>Observer</th><th>Laporan</th><th>Akurasi Sandi</th><th>Ketepatan</th></tr></thead>
                            <tbody>`;
            ranking.forEach((d, idx) => {
                const rank = idx + 1;
                let rClass = rank === 1 ? 'rank-1' : (rank === 2 ? 'rank-2' : (rank === 3 ? 'rank-3' : ''));
                const pClass = d.accSandi >= 100 ? 'pct-good' : (d.accSandi >= 90 ? 'pct-warn' : 'pct-bad');
                const tClass = d.tepatWaktu >= 100 ? 'pct-good' : (d.tepatWaktu >= 90 ? 'pct-warn' : 'pct-bad');
                html += `<tr><td><span class="rank-badge ${rClass}">${rank}</span></td><td style="text-align:left;">${d.name}</td><td><strong>${d.total}</strong></td><td class="${pClass}">${d.accSandi.toFixed(1)}%</td><td class="${tClass}">${d.tepatWaktu.toFixed(1)}%</td></tr>`;
            });
            if(ranking.length === 0) html += `<tr><td colspan="5">Tidak ada data</td></tr>`;
            html += `</tbody></table></div></div></div>`;

            return html;
        }

        // ============================================================
        // RENDER CHARTS
        // ============================================================
        let chartInstances = {};
        function renderAllCharts() {
            if(personnel.length === 0) return;
            Object.values(chartInstances).forEach(ch => { if (ch) ch.destroy(); });
            chartInstances = {};

            const monthsArray = getMonthsInPeriod();
            const ranking = getRanking(monthsArray);
            const trend = getMonthlyTrend();
            const top5 = ranking.slice(0, 5);

            // 0. CHART HARIAN
            const dailyLabels = [], dailyAccSandi = [], dailyTepat = [], dailyTotal = [];
            monthsArray.forEach(mIdx => {
                const daysInMonth = new Date(parseInt(currentYear), mIdx + 1, 0).getDate();
                for (let d = 1; d <= daysInMonth; d++) {
                    const labelStr = currentMode === 'quarter' ? `${d} ${monthNames[mIdx].substring(0,3)}` : `${d}`;
                    dailyLabels.push(labelStr);
                    const stats = (dailyStats[mIdx] && dailyStats[mIdx][d]) || { total: 0, akurasiSandiSum: 0, ketepatanSum: 0 };
                    dailyTotal.push(stats.total);
                    dailyAccSandi.push(stats.total > 0 ? (stats.akurasiSandiSum / stats.total * 100) : null);
                    dailyTepat.push(stats.total > 0 ? (stats.ketepatanSum / stats.total * 100) : null);
                }
            });

            if(document.getElementById('dailyTrendChart')) {
                chartInstances.dailyTrend = new Chart(document.getElementById('dailyTrendChart'), {
                    type: 'line',
                    data: {
                        labels: dailyLabels,
                        datasets: [
                            {
                                type: 'line', label: 'Akurasi Sandi (%)', data: dailyAccSandi, borderColor: '#1a8a4a', backgroundColor: 'transparent',
                                tension: 0.3, borderWidth: 3, pointRadius: currentMode === 'quarter' ? 1 : 3, yAxisID: 'y', spanGaps: true
                            },
                            {
                                type: 'line', label: 'Ketepatan Waktu (%)', data: dailyTepat, borderColor: '#1a3a6b', backgroundColor: 'transparent',
                                tension: 0.3, borderWidth: 2, borderDash: [5,5], pointRadius: currentMode === 'quarter' ? 1 : 2, yAxisID: 'y', spanGaps: true
                            },
                            {
                                type: 'bar', label: 'Jumlah Laporan SYNOP', data: dailyTotal, backgroundColor: '#2d5aa0', borderRadius: 4, yAxisID: 'y1'
                            }
                        ]
                    },
                    options: {
                        responsive: true, maintainAspectRatio: false,
                        scales: { 
                            y: { beginAtZero: true, max: 100, title: {display: true, text: 'Persentase (%)'} },
                            y1: { beginAtZero: true, position: 'right', grid: {display: false}, title: {display: true, text: 'Laporan'}, ticks:{stepSize: 1} },
                            x: { ticks: { maxTicksLimit: currentMode === 'quarter' ? 15 : 31 } }
                        },
                        plugins: { tooltip: { mode: 'index', intersect: false } }
                    }
                });
            }

            // 1. TREND OVERALL (12 Bulan)
            if(document.getElementById('trendChart')) {
                chartInstances.trend = new Chart(document.getElementById('trendChart'), {
                    type: 'line', data: { labels: trend.months,
                        datasets: [
                            { label: 'Akurasi Penyandian (%)', data: trend.accuracies, borderColor: '#1a8a4a', tension: 0.3, borderWidth: 3 },
                            { label: 'Ketepatan Waktu (%)', data: trend.ketepatans, borderColor: '#1a3a6b', borderDash: [5,5], tension: 0.3, borderWidth: 2 }
                        ]
                    },
                    options: { responsive: true, maintainAspectRatio: false, scales: { y: { beginAtZero: true, max: 100 } } }
                });
            }
            
            // 2. RADAR
            if(document.getElementById('radarChart') && top5.length > 0) {
                const radarData = top5.map(d => {
                    return [Math.min(100, d.total / (currentMode === 'quarter' ? 1.5 : 0.5)), d.accSandi, d.tepatWaktu];
                });
                chartInstances.radar = new Chart(document.getElementById('radarChart'), {
                    type: 'radar', data: { labels: ['Volume Laporan', 'Akurasi Sandi', 'Ketepatan Waktu'],
                        datasets: top5.map((d, i) => ({ label: d.name, data: radarData[i], borderColor: `hsl(${i * 60 + 210}, 70%, 50%)`, backgroundColor: `hsla(${i * 60 + 210}, 70%, 50%, 0.15)` }))
                    }, options: { responsive: true, maintainAspectRatio: false, scales: { r: { beginAtZero: true, max: 100 } } }
                });
            }

            // 3. POLAR
            if(document.getElementById('polarChart')) {
                const activeData = ranking.map(d => ({ name: d.name, total: d.total }));
                chartInstances.polar = new Chart(document.getElementById('polarChart'), {
                    type: 'polarArea', data: { labels: activeData.map(d => d.name), datasets: [{ data: activeData.map(d => d.total), backgroundColor: activeData.map((_, i) => `hsl(${i * 30 + 200}, 70%, 55%)`) }] },
                    options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'right', labels: {boxWidth: 10, font: {size: 9}} } } }
                });
            }

            // 4. STACKED BAR (Jam UTC Pengamatan Top 5)
            if(document.getElementById('stackedChart') && top5.length > 0) {
                const top5Names = top5.map(d => d.name);
                const aggregatedUtc = top5Names.map(name => {
                    const pIdx = personnel.indexOf(name);
                    const sumUtc = new Array(8).fill(0);
                    monthsArray.forEach(mIdx => {
                        const mUtc = (utcData[mIdx] && utcData[mIdx][pIdx]) || new Array(8).fill(0);
                        mUtc.forEach((val, h) => sumUtc[h] += val);
                    });
                    return sumUtc;
                });

                chartInstances.stacked = new Chart(document.getElementById('stackedChart'), {
                    type: 'bar', data: { labels: utcLabels, datasets: top5Names.map((name, i) => ({ label: name.split(' ')[0], data: aggregatedUtc[i], backgroundColor: `hsl(${i * 60 + 200}, 70%, 55%)` })) },
                    options: { responsive: true, maintainAspectRatio: false, scales: { x: { stacked: true }, y: { stacked: true, beginAtZero: true } } }
                });
            }
        }

        // ============================================================
        // EVENT LISTENER & INIT
        // ============================================================
        function setupPeriodControls() {
            const periodSelect = document.getElementById('periodSelect');
            const periodTabs = document.getElementById('periodTabs');
            const periodLabel = document.getElementById('periodLabel');

            periodSelect.innerHTML = '';
            periodTabs.innerHTML = '';

            const list = currentMode === 'month' ? monthNames : quarterNames;
            const shortList = currentMode === 'month' ? monthNames.map(m => m.substring(0,3)) : quarterShortNames;
            periodLabel.textContent = currentMode === 'month' ? '📅 Bulan' : '📅 Triwulan';

            list.forEach((name, idx) => {
                const opt = document.createElement('option');
                opt.value = idx; opt.textContent = name;
                if(idx === currentPeriodIdx) opt.selected = true;
                periodSelect.appendChild(opt);

                const btn = document.createElement('button');
                btn.className = 'month-tab' + (idx === currentPeriodIdx ? ' active' : '');
                btn.textContent = shortList[idx];
                btn.addEventListener('click', () => selectPeriod(idx));
                periodTabs.appendChild(btn);
            });
        }

        function selectPeriod(idx) {
            currentPeriodIdx = idx;
            document.getElementById('periodSelect').value = idx;
            document.querySelectorAll('#periodTabs .month-tab').forEach((t, i) => t.classList.toggle('active', i === idx));
            updateDashboard();
        }

        function updateDashboard() {
            document.getElementById('dashboardContent').innerHTML = renderDashboard();
            setTimeout(() => { renderAllCharts(); }, 80);
        }

        function init() {
            const now = new Date();
            const dateStr = `${now.getDate()} ${monthNames[now.getMonth()]} ${now.getFullYear()}`;
            document.getElementById('currentDate').textContent = dateStr;
            document.getElementById('updateTime').textContent = `${dateStr}, ${now.toLocaleTimeString('id-ID', {hour:'2-digit', minute:'2-digit'})} WIB`;

            document.getElementById('yearSelect').addEventListener('change', function() {
                currentYear = this.value;
                fetchSheetData(); 
            });

            document.getElementById('modeSelect').addEventListener('change', function() {
                currentMode = this.value;
                currentPeriodIdx = currentMode === 'month' ? new Date().getMonth() : Math.floor(new Date().getMonth() / 3);
                setupPeriodControls();
                updateDashboard();
            });

            document.getElementById('periodSelect').addEventListener('change', function() {
                selectPeriod(parseInt(this.value));
            });

            fetchSheetData();
        }

        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
