<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard Flight Doc - 12 Bulan</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        /* ----- RESET & VARIABLES ----- */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #0b1d3a; --primary-light: #2980b9; --primary-lighter: #3498db;
            --bg: #f4f7f6; --card-bg: #ffffff; --border: rgba(41, 128, 185, 0.1);
            --shadow: 0 4px 20px rgba(0, 20, 50, 0.06); --radius: 20px; --radius-sm: 12px;
            --font: 'Inter', 'Segoe UI', system-ui, sans-serif; --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }
        body { font-family: var(--font); background: var(--bg); color: var(--primary); padding: 20px; min-height: 100vh; }
        .dashboard { max-width: 1600px; margin: 0 auto; }

        /* ----- HEADER ----- */
        .header { display: flex; flex-wrap: wrap; align-items: center; justify-content: space-between; background: var(--card-bg); padding: 18px 28px; border-radius: var(--radius); box-shadow: var(--shadow); border: 1px solid var(--border); margin-bottom: 24px; gap: 16px; }
        .header-left { display: flex; align-items: center; gap: 16px; }
        .header-icon { width: 48px; height: 48px; background: linear-gradient(135deg, #2980b9, #3498db); border-radius: 14px; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 24px; font-weight: 700; flex-shrink: 0; }
        .header-title h1 { font-size: 24px; font-weight: 700; letter-spacing: -0.4px; color: var(--primary); }
        .header-title span { font-size: 14px; font-weight: 500; color: #5679a9; display: block; margin-top: 2px; }
        .header-right { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
        .header-badge { background: #eef4fc; padding: 6px 18px; border-radius: 40px; font-size: 13px; font-weight: 600; color: var(--primary-light); display: flex; align-items: center; gap: 8px; }
        .header-badge .dot { width: 8px; height: 8px; background: #2ecc71; border-radius: 50%; display: inline-block; }
        .header-badge.loading .dot { background: #f39c12; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0.3; } }
        .header-date { font-size: 14px; color: #4a6a8a; background: #f5f8fc; padding: 6px 16px; border-radius: 40px; font-weight: 500; }

        /* ----- FILTER BAR ----- */
        .filter-bar { display: flex; flex-wrap: wrap; align-items: center; gap: 14px; background: var(--card-bg); padding: 12px 24px; border-radius: var(--radius-sm); box-shadow: var(--shadow); border: 1px solid var(--border); margin-bottom: 24px; }
        .filter-group { display: flex; align-items: center; gap: 8px; }
        .filter-group label { font-weight: 600; font-size: 14px; color: var(--primary); }
        .filter-group select { padding: 8px 16px; border: 1px solid #dce6f2; border-radius: 10px; background: #f9fcff; font-weight: 500; font-size: 14px; color: var(--primary); cursor: pointer; transition: var(--transition); outline: none; }
        .month-tabs { display: flex; gap: 4px; flex-wrap: wrap; margin-left: auto; }
        .month-tab { padding: 6px 14px; border: none; background: transparent; border-radius: 8px; font-weight: 500; font-size: 12px; color: #4a6a8a; cursor: pointer; transition: var(--transition); }
        .month-tab.active { background: var(--primary-light); color: #fff; box-shadow: 0 4px 12px rgba(41, 128, 185, 0.25); }

        /* ----- SUMMARY CARDS ----- */
        .summary-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(170px, 1fr)); gap: 16px; margin-bottom: 24px; }
        .summary-card { background: var(--card-bg); padding: 18px 20px; border-radius: var(--radius-sm); box-shadow: var(--shadow); border: 1px solid var(--border); transition: var(--transition); }
        .summary-card .label { font-size: 12px; font-weight: 500; color: #6a8aaa; text-transform: uppercase; letter-spacing: 0.4px; }
        .summary-card .value { font-size: 30px; font-weight: 700; color: var(--primary); margin-top: 2px; letter-spacing: -0.5px; }
        .summary-card .sub { font-size: 13px; color: #5679a9; margin-top: 2px; }
        .summary-card.accent-blue .value { color: #2980b9; }
        .summary-card.accent-green .value { color: #27ae60; }
        .summary-card.accent-purple .value { color: #8e44ad; }
        .summary-card.accent-orange .value { color: #d35400; }
        .summary-card.accent-red .value { color: #c0392b; }

        /* ----- CARDS & GRID ----- */
        .card { background: var(--card-bg); border-radius: var(--radius); padding: 20px 24px 24px; box-shadow: var(--shadow); border: 1px solid var(--border); margin-bottom: 24px; overflow: hidden; transition: var(--transition); }
        .card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; flex-wrap: wrap; gap: 8px; }
        .card-header h2 { font-size: 16px; font-weight: 600; color: var(--primary); display: flex; align-items: center; gap: 10px; }
        .card-header .chip { font-size: 12px; font-weight: 500; color: #5679a9; background: #f0f6fe; padding: 4px 14px; border-radius: 40px; }
        
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
        .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 24px; }
        .grid-2-1 { display: grid; grid-template-columns: 2fr 1fr; gap: 24px; }
        
        @media (max-width: 1200px) { .grid-3 { grid-template-columns: 1fr 1fr; } .grid-2-1 { grid-template-columns: 1fr; } }
        @media (max-width: 992px) { .grid-2 { grid-template-columns: 1fr; } }
        @media (max-width: 768px) {
            .grid-3 { grid-template-columns: 1fr; } .header { flex-direction: column; align-items: flex-start; gap: 12px; }
            .header-right { width: 100%; justify-content: flex-start; } .summary-grid { grid-template-columns: repeat(2, 1fr); }
            .filter-bar { flex-direction: column; align-items: stretch; } .month-tabs { margin-left: 0; justify-content: center; }
        }

        .chart-container { position: relative; height: 220px; margin-top: 4px; }
        .chart-container.tall { height: 260px; }

        /* ----- RANKING TABLE ----- */
        .rank-table { width: 100%; border-collapse: collapse; font-size: 13px; }
        .rank-table thead th { background: #f5f9ff; color: var(--primary-light); font-weight: 600; font-size: 11px; text-transform: uppercase; padding: 10px 8px; text-align: center; border-bottom: 2px solid #dce6f2; }
        .rank-table thead th:first-child { text-align: left; padding-left: 6px; }
        .rank-table tbody td { padding: 9px 8px; text-align: center; border-bottom: 1px solid #eef2f7; color: #1f2e44; font-weight: 500; }
        .rank-table tbody td:first-child { text-align: left; font-weight: 600; color: var(--primary); padding-left: 6px; }
        .rank-badge { display: inline-flex; align-items: center; justify-content: center; width: 28px; height: 28px; border-radius: 40px; font-weight: 700; font-size: 13px; background: #eef4fc; color: var(--primary-light); }
        .rank-1 { background: #ffd700; color: #7a5a00; } .rank-2 { background: #d0d8e8; color: #3a4a6a; } .rank-3 { background: #e8c8a8; color: #6a4a2a; }
        .pct-good { color: #27ae60; font-weight: 700; } .pct-warn { color: #e67e22; font-weight: 600; } .pct-bad { color: #c0392b; font-weight: 600; }

        /* ----- FOOTER ----- */
        .footer { text-align: center; font-size: 12px; color: #7a9abb; padding: 16px 0 4px; border-top: 1px solid #e9edf2; margin-top: 8px; }
        
        #loadingOverlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(255,255,255,0.8); z-index: 999; justify-content: center; align-items: center;
            flex-direction: column; font-weight: 600; color: var(--primary);
        }
        .spinner { width: 40px; height: 40px; border: 4px solid var(--border); border-top: 4px solid var(--primary-light); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 16px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* UI MESSAGE BOX */
        .msg-box { padding: 24px; border-radius: 12px; margin-bottom: 24px; background: #fff; box-shadow: var(--shadow); }
        .msg-error { border-left: 4px solid #e74c3c; }
    </style>
</head>
<body>

    <div id="loadingOverlay">
        <div class="spinner"></div>
        <div id="loadingText">Menarik data dari Spreadsheet...</div>
    </div>

    <div class="dashboard">
        <header class="header">
            <div class="header-left">
                <div class="header-icon">✈️</div>
                <div class="header-title">
                    <h1>Dashboard Flight Doc</h1>
                    <span>Monitoring Layanan Penerbangan · Live Sheet Data</span>
                </div>
            </div>
            <div class="header-right">
                <div class="header-badge loading" id="statusBadge">
                    <span class="dot"></span>
                    <span id="statusText">Sinkronisasi...</span>
                </div>
                <div class="header-date">
                    📅 <span id="currentDate"></span>
                </div>
            </div>
        </header>

        <div class="filter-bar">
            <div class="filter-group">
                <label for="yearSelect">📆 Tahun</label>
                <select id="yearSelect"></select>
            </div>
            <div class="filter-group">
                <label for="monthSelect">📅 Bulan</label>
                <select id="monthSelect"></select>
            </div>
            <div class="month-tabs" id="monthTabs"></div>
        </div>

        <div id="uiMessageArea"></div>
        <div id="dashboardContent"></div>

        <div class="footer">
            <strong>Dashboard Flight Doc AMP</strong> &middot; Data Live Google Sheets &middot; Diperbarui <span id="updateTime"></span>
        </div>
    </div>

    <script>
        // ============================================================
        // KONFIGURASI GOOGLE SPREADSHEET
        // ============================================================
        const PUBLISHED_ID = '2PACX-1vT4LcIB_-j2pfvt4BUNx4W6GKZiglF1UNo0-oR2yeKqjp7RY_004DF1GVmTxsuUiTx7oyBbrOsbx4Hp'; 
        const GID = '533661624'; 
        const SHEET_NAME = 'db_flighdoc'; 

        let personnel = [];
        let availableYears = [];
        let statsData = []; // [month][person] = { realisasi, target, iw1207, iw1205, iw1209, extraFlight, charter }
        let dailyStats = []; // [month][day] = { realisasi, target }
        let currentYear = new Date().getFullYear().toString();

        const monthNames = ['Januari', 'Februari', 'Maret', 'April', 'Mei', 'Juni', 'Juli', 'Agustus', 'September', 'Oktober', 'November', 'Desember'];

        function csvToArray(strData) {
            strData = strData.trim();
            const firstLine = strData.split(/\r?\n/)[0] || '';
            const countComma = (firstLine.match(/,/g) || []).length;
            const countSemi = (firstLine.match(/;/g) || []).length;
            const countTab = (firstLine.match(/\t/g) || []).length;
            
            let delimiter = ",";
            if (countSemi > countComma && countSemi >= countTab) delimiter = ";";
            else if (countTab > countComma && countTab > countSemi) delimiter = "\t";

            const objPattern = new RegExp(("(\\" + delimiter + "|\\r?\\n|\\r|^)(?:\"([^\"]*(?:\"\"[^\"]*)*)\"|([^\"\\" + delimiter + "\\r\\n]*))"), "gi");
            let arrData = [[]];
            let arrMatches = null;
            while (arrMatches = objPattern.exec(strData)) {
                let strMatchedDelimiter = arrMatches[1];
                if (strMatchedDelimiter.length && strMatchedDelimiter !== delimiter) arrData.push([]);
                let strMatchedValue;
                if (arrMatches[2]) strMatchedValue = arrMatches[2].replace(new RegExp("\"\"", "g"), "\"");
                else strMatchedValue = arrMatches[3];
                arrData[arrData.length - 1].push(strMatchedValue);
            }
            return arrData;
        }

        async function fetchSheetData() {
            document.getElementById('loadingOverlay').style.display = 'flex';
            document.getElementById('uiMessageArea').innerHTML = ''; 
            document.getElementById('dashboardContent').innerHTML = ''; 
            
            const targetUrl = `https://docs.google.com/spreadsheets/d/e/${PUBLISHED_ID}/pub?gid=${GID}&single=true&sheet=${encodeURIComponent(SHEET_NAME)}&output=csv`;
            let csvText = null;
            
            try {
                try {
                    const directResponse = await fetch(targetUrl);
                    if (directResponse.ok) {
                        const text = await directResponse.text();
                        if (!text.trim().startsWith('<html') && !text.trim().startsWith('<!DOCTYPE') && text.trim().length > 10) {
                            csvText = text;
                        }
                    }
                } catch (err) {
                    console.warn("Direct fetch diblokir. Menggunakan Proxy...");
                }

                if (!csvText) {
                    const proxyUrl = `https://api.allorigins.win/raw?url=${encodeURIComponent(targetUrl)}`;
                    const proxyResponse = await fetch(proxyUrl);
                    if (proxyResponse.ok) {
                        const text = await proxyResponse.text();
                        if (text && !text.trim().startsWith('<html') && !text.trim().startsWith('<!DOCTYPE') && text.trim().length > 10) {
                            csvText = text;
                        }
                    }
                }

                if (!csvText) throw new Error('Gagal menarik data. Pastikan spreadsheet dipublikasikan ke web dalam format CSV.');

                processCSVData(csvText);
                
                document.getElementById('statusBadge').classList.remove('loading');
                document.getElementById('statusBadge').style.background = '#eef4fc';
                document.getElementById('statusBadge').style.color = '#1a3a6b';
                document.getElementById('statusBadge').querySelector('.dot').style.background = '#2ecc71';
                document.getElementById('statusText').textContent = 'Live Connected';
            } catch (error) {
                console.error("Error:", error);
                document.getElementById('statusBadge').classList.remove('loading');
                document.getElementById('statusBadge').style.background = '#fdeaea';
                document.getElementById('statusBadge').style.color = '#e74c3c';
                document.getElementById('statusBadge').querySelector('.dot').style.background = '#e74c3c';
                document.getElementById('statusText').textContent = 'Koneksi Gagal';

                document.getElementById('uiMessageArea').innerHTML = `
                    <div class="msg-box msg-error">
                        <h3 style="color:#e74c3c; margin-bottom:10px;">❌ Gagal Mengambil Data</h3>
                        <p><strong>Pesan:</strong> ${error.message}</p>
                    </div>
                `;
            } finally {
                document.getElementById('loadingOverlay').style.display = 'none';
            }
        }

        // ============================================================
        // PEMBACAAN DATA LENGKAP SEMUA FLIGHT (IW1207, IW1205, IW1209, EXTRA, CHARTER)
        // ============================================================
        function processCSVData(csvText) {
            const rawData = [];
            const observersSet = new Set();
            const yearsSet = new Set();

            const rows = csvToArray(csvText.trim());
            if (rows.length < 2) throw new Error('Data sheet kosong.');

            for (let i = 1; i < rows.length; i++) {
                const cells = rows[i];
                if (cells.length < 8 || !cells[0]) continue; 

                try {
                    // 1. PARSE TANGGAL
                    let dateStr = cells[0].replace(/["']/g, '').trim().split(' ')[0]; 
                    let dateObj = new Date(dateStr);
                    
                    if (dateStr.includes('/')) {
                        let parts = dateStr.split('/');
                        if (parts.length === 3) {
                            let p0 = parseInt(parts[0]);
                            let p1 = parseInt(parts[1]);
                            let p2 = parseInt(parts[2]);
                            
                            let y = p2 > 1000 ? p2 : (p0 > 1000 ? p0 : new Date().getFullYear());
                            let m = p1;
                            let d = p0;
                            if (p0 > 1000) { d = p2; } 
                            if (p1 > 12) { m = p0; d = p1; } 
                            dateObj = new Date(y, m - 1, d);
                        }
                    } else if (dateStr.includes('-')) {
                        let parts = dateStr.split('-');
                        if (parts.length === 3 && parts[2].length === 4) {
                            dateObj = new Date(parseInt(parts[2]), parseInt(parts[1]) - 1, parseInt(parts[0]));
                        }
                    }

                    if (isNaN(dateObj.getTime())) continue; 

                    const year = dateObj.getFullYear().toString();
                    const month = dateObj.getMonth();
                    const day = dateObj.getDate();
                    yearsSet.add(year);

                    // 2. PARSE METRIK PENERBANGAN SECARA TERPISAH
                    let realisasi = parseInt((cells[1] || '').toString().replace(/[^0-9.-]/g, '')) || 0;
                    let iw1207 = parseInt((cells[2] || '').toString().replace(/[^0-9.-]/g, '')) || 0;
                    let iw1205 = parseInt((cells[3] || '').toString().replace(/[^0-9.-]/g, '')) || 0;
                    let iw1209 = parseInt((cells[4] || '').toString().replace(/[^0-9.-]/g, '')) || 0;
                    let extraFlight = parseInt((cells[5] || '').toString().replace(/[^0-9.-]/g, '')) || 0;
                    let charter = parseInt((cells[6] || '').toString().replace(/[^0-9.-]/g, '')) || 0;

                    // 3. PARSE TARGET (Cek Kolom H lalu Kolom I)
                    let targetVal = parseInt((cells[7] || '').toString().replace(/[^0-9.-]/g, '')) || 0;
                    if (targetVal === 0 && cells[8] && !isNaN(cells[8].toString().trim())) {
                        targetVal = parseInt(cells[8].toString().replace(/[^0-9.-]/g, '')) || 0;
                    }
                    let target = targetVal > 0 ? targetVal : realisasi;

                    // 4. PARSE NAMA PETUGAS (Cek Kolom J lalu Kolom I)
                    let observer = '';
                    if (cells[9] && isNaN(cells[9].toString().replace(/["']/g, '').trim())) {
                        observer = cells[9].toString().replace(/["']/g, '').trim().toUpperCase();
                    } 
                    else if (cells[8] && isNaN(cells[8].toString().replace(/["']/g, '').trim())) {
                        observer = cells[8].toString().replace(/["']/g, '').trim().toUpperCase();
                    }
                    if (!observer) continue;

                    observersSet.add(observer);

                    rawData.push({ year, month, day, realisasi, iw1207, iw1205, iw1209, extraFlight, charter, target, observer });

                } catch (e) {
                    console.warn("Parse error at row " + i, cells);
                }
            }

            personnel = Array.from(observersSet).sort();
            availableYears = Array.from(yearsSet).sort().reverse();
            
            if(availableYears.length === 0) availableYears = [new Date().getFullYear().toString()];
            if(!availableYears.includes(currentYear)) currentYear = availableYears[0];

            const yearSelect = document.getElementById('yearSelect');
            yearSelect.innerHTML = '';
            availableYears.forEach(y => {
                const opt = document.createElement('option');
                opt.value = y; opt.textContent = y;
                if(y === currentYear) opt.selected = true;
                yearSelect.appendChild(opt);
            });

            buildEmptyDataArrays();

            rawData.forEach(d => {
                if(d.year === currentYear) {
                    const pIdx = personnel.indexOf(d.observer);
                    if (pIdx !== -1 && statsData[d.month] && statsData[d.month][pIdx]) {
                        statsData[d.month][pIdx].realisasi += d.realisasi;
                        statsData[d.month][pIdx].target += d.target;
                        statsData[d.month][pIdx].iw1207 += d.iw1207;
                        statsData[d.month][pIdx].iw1205 += d.iw1205;
                        statsData[d.month][pIdx].iw1209 += d.iw1209;
                        statsData[d.month][pIdx].extraFlight += d.extraFlight;
                        statsData[d.month][pIdx].charter += d.charter;
                    }

                    if (dailyStats[d.month] && dailyStats[d.month][d.day]) {
                        dailyStats[d.month][d.day].realisasi += d.realisasi;
                        dailyStats[d.month][d.day].target += d.target;
                    }
                }
            });

            setupMonthTabs();
            
            let activeMonth = new Date().getMonth();
            if (statsData[activeMonth] && statsData[activeMonth].every(p => p && p.realisasi === 0 && p.target === 0)) {
                for(let m = 11; m >= 0; m--) {
                    if(statsData[m] && !statsData[m].every(p => p && p.realisasi === 0 && p.target === 0)) {
                        activeMonth = m; break;
                    }
                }
            }

            document.getElementById('monthSelect').value = activeMonth;
            updateDashboard(activeMonth);
        }

        function buildEmptyDataArrays() {
            statsData = [];
            dailyStats = [];

            for(let m = 0; m < 12; m++) {
                let monthStats = [];
                for(let p = 0; p < personnel.length; p++) {
                    monthStats.push({ realisasi: 0, target: 0, iw1207: 0, iw1205: 0, iw1209: 0, extraFlight: 0, charter: 0 });
                }
                statsData.push(monthStats);

                let days = [];
                for(let d = 0; d <= 31; d++) {
                    days.push({ realisasi: 0, target: 0 });
                }
                dailyStats.push(days);
            }
        }

        function getTotals(monthIdx) {
            const stats = statsData[monthIdx] || [];
            let realisasi = 0, target = 0, extraFlight = 0, charter = 0;
            let iw1207 = 0, iw1205 = 0, iw1209 = 0;

            stats.forEach(s => {
                if (s) {
                    realisasi += s.realisasi;
                    target += s.target;
                    iw1207 += s.iw1207;
                    iw1205 += s.iw1205;
                    iw1209 += s.iw1209;
                    extraFlight += s.extraFlight;
                    charter += s.charter;
                }
            });
            return { realisasi, target, extraFlight, charter, iw1207, iw1205, iw1209 };
        }

        function getRanking(monthIdx) {
            const stats = statsData[monthIdx] || [];
            return personnel.map((name, i) => {
                const s = stats[i] || { realisasi: 0, target: 0, iw1207: 0, iw1205: 0, iw1209: 0, extraFlight: 0, charter: 0 };
                const capaian = s.target > 0 ? (s.realisasi / s.target * 100) : (s.realisasi > 0 ? 100 : 0);
                return { name, total: s.realisasi, target: s.target, capaian, 
                         iw1207: s.iw1207, iw1205: s.iw1205, iw1209: s.iw1209, extraFlight: s.extraFlight, charter: s.charter };
            }).filter(d => d.total > 0 || d.target > 0).sort((a, b) => b.total - a.total); 
        }

        function getMonthlyTrend() {
            const months = []; const realisasis = []; const targets = []; const capaians = [];
            for (let m = 0; m < 12; m++) {
                months.push(monthNames[m].substring(0, 3));
                const { realisasi, target } = getTotals(m);
                realisasis.push(realisasi);
                targets.push(target);
                capaians.push(target > 0 ? (realisasi / target * 100) : (realisasi > 0 ? 100 : 0));
            }
            return { months, realisasis, targets, capaians };
        }

        function renderDashboard(monthIdx) {
            if(personnel.length === 0) return ''; 

            const month = monthNames[monthIdx];
            const overall = getTotals(monthIdx);
            
            const avgCapaian = overall.target > 0 ? (overall.realisasi / overall.target * 100) : (overall.realisasi > 0 ? 100 : 0);
            const ranking = getRanking(monthIdx);

            let html = '';
            
            // SUMMARY CARDS (Kini menampilkan Extra Flight dan Charter secara lengkap)
            html += `
                <div class="summary-grid">
                    <div class="summary-card accent-blue">
                        <div class="label">✈️ Dokumen Dibuat</div>
                        <div class="value">${overall.realisasi}</div>
                        <div class="sub">Total Flight Doc (${month})</div>
                    </div>
                    <div class="summary-card accent-purple">
                        <div class="label">🎯 Target Dokumen</div>
                        <div class="value">${overall.target}</div>
                        <div class="sub">Berdasarkan Jadwal</div>
                    </div>
                    <div class="summary-card accent-green">
                        <div class="label">✅ Capaian Layanan</div>
                        <div class="value">${avgCapaian.toFixed(1)}%</div>
                        <div class="sub">Realisasi vs Target</div>
                    </div>
                    <div class="summary-card accent-orange">
                        <div class="label">➕ Extra Flight</div>
                        <div class="value">${overall.extraFlight}</div>
                        <div class="sub">Penerbangan Tambahan</div>
                    </div>
                    <div class="summary-card accent-orange">
                        <div class="label">🛩️ Flight Charter</div>
                        <div class="value">${overall.charter}</div>
                        <div class="sub">Penerbangan Tidak Terjadwal</div>
                    </div>
                    <div class="summary-card accent-red">
                        <div class="label">🏆 Paling Aktif</div>
                        <div class="value" style="font-size:22px; line-height:1.2; margin-top:6px;">${ranking.length > 0 ? ranking[0].name : '-'}</div>
                    </div>
                </div>
            `;

            // CHART: TREN HARIAN
            html += `
                <div class="card" style="margin-bottom: 24px;">
                    <div class="card-header">
                        <h2>📆 Tren Volume Penerbangan Harian</h2>
                        <span class="chip">${month} ${currentYear}</span>
                    </div>
                    <div class="chart-container tall">
                        <canvas id="dailyTrendChart"></canvas>
                    </div>
                </div>
            `;

            // BARIS 1: TREND + RADAR
            html += `<div class="grid-2">
                <div class="card">
                    <div class="card-header">
                        <h2>📈 Tren Capaian (12 Bulan)</h2><span class="chip">Realisasi vs Target</span>
                    </div>
                    <div class="chart-container tall"><canvas id="trendChart"></canvas></div>
                </div>
                <div class="card">
                    <div class="card-header"><h2>🕸️ Beban Maskapai (Top 5)</h2><span class="chip">${month}</span></div>
                    <div class="chart-container tall"><canvas id="radarChart"></canvas></div>
                </div>
            </div>`;

            // BARIS 2: POLAR + STACKED + DOUGHNUT
            html += `<div class="grid-3">
                <div class="card">
                    <div class="card-header"><h2>🍩 Proporsi Beban Petugas</h2><span class="chip">${month}</span></div>
                    <div class="chart-container"><canvas id="polarChart"></canvas></div>
                </div>
                <div class="card">
                    <div class="card-header"><h2>📊 Rincian Penerbangan (Top 5)</h2><span class="chip">${month}</span></div>
                    <div class="chart-container"><canvas id="stackedChart"></canvas></div>
                </div>
                <div class="card">
                    <div class="card-header"><h2>📉 Distribusi Jenis Flight</h2><span class="chip">${month}</span></div>
                    <div class="chart-container"><canvas id="doughnutChart"></canvas></div>
                </div>
            </div>`;

            // BARIS 3: HEATMAP + RANKING
            const top8 = ranking.slice(0, 8);
            html += `<div class="grid-2-1">
                <div class="card">
                    <div class="card-header"><h2>🔥 Heatmap Capaian (Top 8)</h2><span class="chip">${month}</span></div>
                    <div style="display:grid; grid-template-columns: repeat(4, 1fr); gap:12px;">`;
            
            if(top8.length === 0) html += `<p style="grid-column: span 4; text-align:center; color:#999;">Belum ada data di bulan ini.</p>`;
            
            top8.forEach((d) => {
                const pct = Math.round(d.capaian);
                const color = pct >= 100 ? '#27ae60' : (pct >= 90 ? '#f39c12' : '#c0392b');
                const barWidth = Math.min(pct, 100);
                html += `
                    <div style="background:#f5f9ff; padding:12px; border-radius:12px; text-align:center;">
                        <div style="font-weight:600; font-size:11px; color:var(--primary); overflow:hidden; text-overflow:ellipsis; white-space:nowrap;" title="${d.name}">${d.name}</div>
                        <div style="margin:8px 0; background:#e9edf2; border-radius:20px; height:12px; overflow:hidden;">
                            <div style="width:${barWidth}%; height:100%; background:${color}; border-radius:20px; transition: width 0.6s ease;"></div>
                        </div>
                        <div style="font-size:18px; font-weight:700; color:${color};">${pct}%</div>
                        <div style="font-size:11px; color:#7a9abb;">${d.total} doc dibuat</div>
                    </div>`;
            });
            html += `</div></div>
                <div class="card">
                    <div class="card-header"><h2>🏆 Peringkat Kinerja</h2><span class="chip">${month}</span></div>
                    <div style="max-height:280px; overflow-y:auto;">
                        <table class="rank-table">
                            <thead><tr><th>Rank</th><th>Petugas</th><th>Realisasi</th><th>Target</th><th>Capaian</th></tr></thead>
                            <tbody>`;
            ranking.forEach((d, idx) => {
                const rank = idx + 1;
                let rClass = rank === 1 ? 'rank-1' : (rank === 2 ? 'rank-2' : (rank === 3 ? 'rank-3' : ''));
                const pClass = d.capaian >= 100 ? 'pct-good' : (d.capaian >= 90 ? 'pct-warn' : 'pct-bad');
                html += `<tr><td><span class="rank-badge ${rClass}">${rank}</span></td><td style="text-align:left;">${d.name}</td><td>${d.total}</td><td>${d.target}</td><td class="${pClass}">${d.capaian.toFixed(1)}%</td></tr>`;
            });
            if(ranking.length === 0) html += `<tr><td colspan="5">Tidak ada data</td></tr>`;
            html += `</tbody></table></div></div></div>`;

            return html;
        }

        let chartInstances = {};
        function renderAllCharts(monthIdx) {
            if(personnel.length === 0) return;
            Object.values(chartInstances).forEach(ch => { if (ch) ch.destroy(); });
            chartInstances = {};

            const ranking = getRanking(monthIdx);
            const trend = getMonthlyTrend();
            const top5 = ranking.slice(0, 5);

            const daysInMonth = new Date(parseInt(currentYear), monthIdx + 1, 0).getDate();
            const dailyLabels = [], dailyRealisasi = [], dailyTarget = [];

            for (let d = 1; d <= daysInMonth; d++) {
                dailyLabels.push(d); 
                const stats = (dailyStats[monthIdx] && dailyStats[monthIdx][d]) || { realisasi: 0, target: 0 };
                dailyRealisasi.push(stats.realisasi);
                dailyTarget.push(stats.target);
            }

            if(document.getElementById('dailyTrendChart')) {
                chartInstances.dailyTrend = new Chart(document.getElementById('dailyTrendChart'), {
                    type: 'line',
                    data: {
                        labels: dailyLabels,
                        datasets: [
                            {
                                type: 'line', label: 'Target Dokumen', data: dailyTarget, borderColor: '#e74c3c', backgroundColor: 'transparent',
                                tension: 0.1, borderWidth: 2, pointRadius: 2, borderDash: [5,5]
                            },
                            {
                                type: 'bar', label: 'Realisasi Flight Doc', data: dailyRealisasi, backgroundColor: '#3498db', borderRadius: 4
                            }
                        ]
                    },
                    options: {
                        responsive: true, maintainAspectRatio: false,
                        scales: { y: { beginAtZero: true } },
                        plugins: { tooltip: { mode: 'index', intersect: false } }
                    }
                });
            }

            if(document.getElementById('trendChart')) {
                chartInstances.trend = new Chart(document.getElementById('trendChart'), {
                    type: 'line', data: { labels: trend.months,
                        datasets: [
                            { label: 'Realisasi', data: trend.realisasis, borderColor: '#2980b9', backgroundColor: 'rgba(41, 128, 185, 0.1)', fill: true, tension: 0.3, yAxisID: 'y' },
                            { label: 'Target', data: trend.targets, borderColor: '#e74c3c', borderDash: [5,5], tension: 0.3, yAxisID: 'y' }
                        ]
                    },
                    options: { responsive: true, maintainAspectRatio: false, scales: { y: { beginAtZero: true } } }
                });
            }
            
            // RADAR CHART (Menampilkan 5 kategori penerbangan secara lengkap)
            if(document.getElementById('radarChart') && top5.length > 0) {
                const radarData = top5.map(d => {
                    return [d.total, d.iw1207, d.iw1205, d.iw1209, d.extraFlight, d.charter];
                });
                chartInstances.radar = new Chart(document.getElementById('radarChart'), {
                    type: 'radar', data: { labels: ['Total Flight', 'IW 1207', 'IW 1205', 'IW 1209', 'Extra Flight', 'Charter'],
                        datasets: top5.map((d, i) => ({ label: d.name, data: radarData[i], borderColor: `hsl(${i * 60 + 200}, 70%, 50%)`, backgroundColor: `hsla(${i * 60 + 200}, 70%, 50%, 0.15)` }))
                    }, options: { responsive: true, maintainAspectRatio: false, scales: { r: { beginAtZero: true } } }
                });
            }

            if(document.getElementById('polarChart')) {
                const activeData = ranking.map(d => ({ name: d.name, total: d.total }));
                chartInstances.polar = new Chart(document.getElementById('polarChart'), {
                    type: 'polarArea', data: { labels: activeData.map(d => d.name), datasets: [{ data: activeData.map(d => d.total), backgroundColor: activeData.map((_, i) => `hsl(${i * 30 + 200}, 70%, 55%)`) }] },
                    options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'right', labels: {boxWidth: 10, font: {size: 9}} } } }
                });
            }

            // STACKED BAR CHART (Lengkap dengan Extra Flight)
            if(document.getElementById('stackedChart') && top5.length > 0) {
                const names = top5.map(d => d.name);
                const ds_1207 = top5.map(d => d.iw1207);
                const ds_1205 = top5.map(d => d.iw1205);
                const ds_1209 = top5.map(d => d.iw1209);
                const ds_extra = top5.map(d => d.extraFlight);
                const ds_chart = top5.map(d => d.charter);

                chartInstances.stacked = new Chart(document.getElementById('stackedChart'), {
                    type: 'bar', data: { 
                        labels: names.map(n => n.split(' ')[0]),
                        datasets: [
                            { label: 'IW 1207', data: ds_1207, backgroundColor: '#3498db' },
                            { label: 'IW 1205', data: ds_1205, backgroundColor: '#2ecc71' },
                            { label: 'IW 1209', data: ds_1209, backgroundColor: '#9b59b6' },
                            { label: 'Extra Flight', data: ds_extra, backgroundColor: '#e67e22' },
                            { label: 'Charter', data: ds_chart, backgroundColor: '#f1c40f' }
                        ] 
                    },
                    options: { responsive: true, maintainAspectRatio: false, scales: { x: { stacked: true }, y: { stacked: true, beginAtZero: true } } }
                });
            }

            // DOUGHNUT CHART (Lengkap dengan Extra Flight)
            if(document.getElementById('doughnutChart')) {
                const overall = getTotals(monthIdx);
                chartInstances.doughnut = new Chart(document.getElementById('doughnutChart'), {
                    type: 'doughnut', data: { 
                        labels: ['IW 1207', 'IW 1205', 'IW 1209', 'Extra Flight', 'Charter'], 
                        datasets: [{ data: [overall.iw1207, overall.iw1205, overall.iw1209, overall.extraFlight, overall.charter], backgroundColor: ['#3498db', '#2ecc71', '#9b59b6', '#e67e22', '#f1c40f'] }] 
                    },
                    options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'right' } } }
                });
            }
        }

        function setupMonthTabs() {
            const tabsContainer = document.getElementById('monthTabs');
            tabsContainer.innerHTML = '';
            const selMonth = parseInt(document.getElementById('monthSelect').value);
            monthNames.forEach((name, idx) => {
                const btn = document.createElement('button');
                btn.className = 'month-tab' + (idx === selMonth ? ' active' : '');
                btn.textContent = name.substring(0, 3);
                btn.addEventListener('click', function() {
                    document.querySelectorAll('.month-tab').forEach(t => t.classList.remove('active'));
                    this.classList.add('active');
                    document.getElementById('monthSelect').value = idx;
                    updateDashboard(idx);
                });
                tabsContainer.appendChild(btn);
            });
        }

        function updateDashboard(monthIdx) {
            document.getElementById('dashboardContent').innerHTML = renderDashboard(monthIdx);
            setTimeout(() => { renderAllCharts(monthIdx); }, 80);
        }

        function init() {
            const now = new Date();
            const dateStr = `${now.getDate()} ${monthNames[now.getMonth()]} ${now.getFullYear()}`;
            document.getElementById('currentDate').textContent = dateStr;
            document.getElementById('updateTime').textContent = `${dateStr}, ${now.toLocaleTimeString('id-ID', {hour:'2-digit', minute:'2-digit'})} WIB`;

            document.getElementById('monthSelect').innerHTML = monthNames.map((m, i) => `<option value="${i}">${m}</option>`).join('');
            document.getElementById('monthSelect').value = now.getMonth();

            document.getElementById('yearSelect').addEventListener('change', function() {
                currentYear = this.value;
                fetchSheetData(); 
            });
            document.getElementById('monthSelect').addEventListener('change', function() {
                const idx = parseInt(this.value);
                document.querySelectorAll('.month-tab').forEach((tab, i) => tab.classList.toggle('active', i === idx));
                updateDashboard(idx);
            });

            fetchSheetData();
        }

        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
